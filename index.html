<!DOCTYPE html>
<html>
<head>
<title>TaskTrack</title>

<style>

body{
font-family:Arial;
background:#f0f3f8;
margin:0;
text-align:center;
}

.page{
display:none;
padding-top:50px;
}

.active{
display:block;
}

.header-img{
width:400px;
height:150px;
background:white;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.header-img img{
width:100%;
height:100%;
object-fit:cover;
}

.container{
margin-top:40px;
}

.box{
background:white;
width:200px;
margin:15px auto;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#4a6cf7;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#324ed1;
}

.task-section{
width:70%;
margin:auto;
margin-top:30px;
}

input{
padding:10px;
width:60%;
}

.task{
background:white;
padding:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
border-radius:5px;
}

.completed{
text-decoration:line-through;
color:gray;
}

.delete{
background:red;
}

.edit{
background:orange;
}

.report{
background:white;
padding:15px;
margin-top:20px;
border-radius:5px;
}

</style>
</head>

<body>

<!-- FRONT PAGE -->

<div id="home" class="page active">

<div class="header-img">
<img src="https://picsum.photos/600/200">
</div>

<div class="container">

<div class="box">
<button onclick="openMenu()">Open</button>
</div>

<div class="box">
<button onclick="showPage('tutorial')">Tutorial</button>
</div>

</div>

</div>


<!-- MENU PAGE -->

<div id="menu" class="page">

<div class="header-img">
<img src="https://picsum.photos/600/200">
</div>

<div class="container">

<div class="box">
<button onclick="showPage('addPage')">Add Task</button>
</div>

<div class="box">
<button onclick="showPage('updatePage')">Update Task</button>
</div>

<div class="box">
<button onclick="showPage('viewPage')">View Task</button>
</div>

<div class="box">
<button onclick="showPage('home')">Back</button>
</div>

</div>

</div>


<!-- ADD TASK PAGE -->

<div id="addPage" class="page">

<h2>Add Task</h2>

<div class="task-section">

<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

</div>

<button onclick="showPage('menu')">Back</button>

</div>


<!-- UPDATE TASK PAGE -->

<div id="updatePage" class="page">

<h2>Update Tasks</h2>

<div id="updateList" class="task-section"></div>

<button onclick="showPage('menu')">Back</button>

</div>


<!-- VIEW TASK PAGE -->

<div id="viewPage" class="page">

<h2>View Tasks</h2>

<div id="taskList" class="task-section"></div>

<div class="report">

<p>Total Tasks: <span id="total">0</span></p>
<p>Completed: <span id="completed">0</span></p>
<p>Pending: <span id="pending">0</span></p>

</div>

<button onclick="showPage('menu')">Back</button>

</div>


<!-- TUTORIAL PAGE -->

<div id="tutorial" class="page">

<h2>TaskTrack Tutorial</h2>

<p>1. Click OPEN to access task tools.</p>
<p>2. Use ADD TASK to create a new task.</p>
<p>3. Use UPDATE TASK to edit or delete tasks.</p>
<p>4. Use VIEW TASK to monitor completed and pending tasks.</p>

<button onclick="showPage('home')">Back</button>

</div>


<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

displayTasks();
displayUpdate();

}

function openMenu(){
showPage("menu");
}

function addTask(){

let input=document.getElementById("taskInput");

if(input.value==="") return;

tasks.push({
text:input.value,
done:false
});

input.value="";
saveTasks();

alert("Task Added!");

}

function displayTasks(){

let list=document.getElementById("taskList");
if(!list) return;

list.innerHTML="";

tasks.forEach((task,i)=>{

let div=document.createElement("div");
div.className="task";

let text=document.createElement("span");
text.innerText=task.text;

if(task.done){
text.classList.add("completed");
}

text.onclick=function(){
tasks[i].done=!tasks[i].done;
saveTasks();
displayTasks();
};

div.appendChild(text);

list.appendChild(div);

});

updateReport();

}

function displayUpdate(){

let list=document.getElementById("updateList");
if(!list) return;

list.innerHTML="";

tasks.forEach((task,i)=>{

let div=document.createElement("div");
div.className="task";

let text=document.createElement("span");
text.innerText=task.text;

let edit=document.createElement("button");
edit.innerText="Edit";
edit.className="edit";

edit.onclick=function(){

let newTask=prompt("Edit task:",task.text);

if(newTask){
tasks[i].text=newTask;
saveTasks();
displayUpdate();
}

};

let del=document.createElement("button");
del.innerText="Delete";
del.className="delete";

del.onclick=function(){

tasks.splice(i,1);
saveTasks();
displayUpdate();

};

div.appendChild(text);
div.appendChild(edit);
div.appendChild(del);

list.appendChild(div);

});

}

function updateReport(){

let total=tasks.length;
let completed=tasks.filter(t=>t.done).length;
let pending=total-completed;

document.getElementById("total").innerText=total;
document.getElementById("completed").innerText=completed;
document.getElementById("pending").innerText=pending;

}

displayTasks();

</script>

</body>
</html>
